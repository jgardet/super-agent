# OpenClaw gateway configuration
# Docs: https://docs.openclaw.ai

gateway:
  port: 18789
  host: "0.0.0.0"

llm:
  provider: ollama
  model: "${ACTIVE_MODEL}"
  base_url: "${OLLAMA_BASE_URL}"
  fallback:
    provider: anthropic
    model: claude-sonnet-4-6
    api_key: "${ANTHROPIC_API_KEY}"

memory:
  long_term: /root/.openclaw/workspace/MEMORY.md
  daily_notes: true
  dreaming:
    enabled: true
    consolidation_hour: 3

acp:
  enabled: true
  backend: acpx
  allowed_agents:
    - opencode
    - claude
    - codex
    - gemini
  max_concurrent_sessions: 3
  dispatch:
    enabled: true

integrations:
  orchestrator:
    url: "http://orchestrator:8000"
    enabled: true

channels:
  webchat:
    enabled: true
  telegram:
    enabled: true
    token: "${TELEGRAM_BOT_TOKEN}"
  slack:
    enabled: true
    token: "${SLACK_BOT_TOKEN}"
  discord:
    enabled: true
    token: "${DISCORD_BOT_TOKEN}"
