# OpenClaw gateway configuration
# Docs: https://docs.openclaw.ai

gateway:
  port: 18789
  host: "0.0.0.0"

llm:
  provider: ollama
  model: "${ACTIVE_MODEL}"
  base_url: "${OLLAMA_BASE_URL}"
  fallback:
    provider: anthropic
    model: claude-sonnet-4-6
    api_key: "${ANTHROPIC_API_KEY}"

memory:
  long_term: /root/.openclaw/workspace/MEMORY.md
  daily_notes: true
  dreaming:
    enabled: true
    consolidation_hour: 3
  # Shared vector memory — every significant note is mirrored to the
  # orchestrator's Mem0/Qdrant store so all agents (crews, n8n, OpenCode)
  # see the same cross-session context.
  shared:
    enabled: true
    backend: orchestrator
    base_url: "http://orchestrator:8000"
    search_endpoint: "/memory/search"
    write_endpoint: "/memory"
    user_id: "super-agent"      # shared namespace across agents
    source: "openclaw"          # tagged in metadata on every write
    # Pull relevant memories into the prompt before answering.
    recall_on_turn: true
    recall_limit: 5

acp:
  enabled: true
  backend: acpx
  allowed_agents:
    - opencode
    - claude
    - codex
    - gemini
  max_concurrent_sessions: 3
  dispatch:
    enabled: true

integrations:
  orchestrator:
    url: "http://orchestrator:8000"
    enabled: true

channels:
  webchat:
    enabled: true
  telegram:
    enabled: true
    token: "${TELEGRAM_BOT_TOKEN}"
  slack:
    enabled: true
    token: "${SLACK_BOT_TOKEN}"
  discord:
    enabled: true
    token: "${DISCORD_BOT_TOKEN}"
